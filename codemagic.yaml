workflows:
  ios-workflow:
    name: Build vxkit
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
    scripts:

      - name: Nettoyage
        script: |
          flutter clean
          flutter pub get

      - name: Build IPA sans Xcode
        script: |
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
