workflows:
  ios-workflow:
    name: Build vxkit
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:

      - name: Nettoyage
        script: |
          flutter clean
          flutter pub get

      - name: Préparation iOS
        script: |
          cd ios
          pod install
          cd ..

      - name: Patch Xcode (désactivation signature)
        script: |
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;//g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Build iOS sans signature
        script: |
          flutter build ios --release --no-codesign

      - name: Création IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r $CM_BUILD_DIR/vxkit.ipa Payload

    artifacts:
      - "*.ipa"