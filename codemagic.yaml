workflows:
  ios-workflow:
    name: Build vxkit
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Nettoyage et Régénération du projet
        script: |
          # Supprime l'ancien dossier iOS pour repartir sur une base saine
          rm -rf ios
          flutter create --platforms ios .
          flutter clean
          flutter packages pub get
      - name: Compilation brute pour iPhone Réel
        script: | 
          # --no-codesign : ignore la signature Apple
          # --release : optimise l'app pour les performances
          # build ios : génère les fichiers pour le vrai processeur de l'iPhone
          flutter build ios --release --no-codesign
      - name: Création du package IPA pour Sideloadly
        script: | 
          # On se place dans le dossier contenant le binaire pour iPhone réel
          cd build/ios/iphoneos
          
          # On crée la structure Payload nécessaire
          mkdir -p Payload
          cp -r Runner.app Payload/
          
          # On compresse en .ipa pour Sideloadly
          zip -r $CM_BUILD_DIR/vxkit.ipa Payload
    artifacts:
      - "*.ipa"
